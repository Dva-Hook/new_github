name: 清理工作流运行记录

on:
  workflow_dispatch:
    inputs:
      workflow_name:
        type: string
        description: '输入 "all" 清理所有工作流，或输入工作流名称清理指定工作流'
        required: true
        default: 'all'
      count:
        description: '最多清理的运行次数'
        required: false
        default: '20'
      delete_failed:
        description: '删除失败的运行记录？'
        required: false
        type: boolean
        default: true
      delete_success:
        description: '删除成功的运行记录？'
        required: false
        type: boolean
        default: true
      delete_cancelled:
        description: '删除已取消的运行记录？'
        required: false
        type: boolean
        default: true
      reverse_order:
        description: '从旧到新开始清理？'
        required: false
        type: boolean
        default: true

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: 安装 GitHub CLI 和 jq
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: 认证 GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: 清理工作流运行记录
        env:
          REPO: ${{ github.repository }}
          COUNT: ${{ inputs.count }}
          DELETE_FAILED: ${{ inputs.delete_failed }}
          DELETE_SUCCESS: ${{ inputs.delete_success }}
          DELETE_CANCELLED: ${{ inputs.delete_cancelled }}
          REVERSE_ORDER: ${{ inputs.reverse_order }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -e

          echo "当前仓库：$REPO"

          delete_runs_for_workflow() {
            local WORKFLOW_ID="$1"
            local WORKFLOW_LABEL="$2"

            echo ""
            echo "============================================"
            echo "处理工作流: $WORKFLOW_LABEL (ID: $WORKFLOW_ID)"
            echo "============================================"

            echo "开始分页获取所有运行记录..."
            PER_PAGE=100
            PAGE=1
            MATCHED_RUNS="[]"
            while true; do
              RESP=$(gh api "repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?per_page=$PER_PAGE&page=$PAGE")
              RUNS=$(echo "$RESP" | jq '.workflow_runs')
              COUNT_THIS_PAGE=$(echo "$RUNS" | jq 'length')

              if [ "$COUNT_THIS_PAGE" -eq 0 ]; then
                break
              fi

              MATCHED_RUNS=$(jq -s 'add' <(echo "$MATCHED_RUNS") <(echo "$RUNS"))
              PAGE=$((PAGE + 1))
            done

            TOTAL_RUNS=$(echo "$MATCHED_RUNS" | jq 'length')
            echo "共获取到 $TOTAL_RUNS 条运行记录。"

            if [ "$TOTAL_RUNS" -eq 0 ]; then
              echo "无运行记录，跳过。"
              return
            fi

            # 排序顺序：旧到新 or 新到旧
            if [[ "$REVERSE_ORDER" == "true" ]]; then
              SORTED_RUNS=$(echo "$MATCHED_RUNS" | jq 'sort_by(.run_started_at)')
            else
              SORTED_RUNS=$(echo "$MATCHED_RUNS" | jq 'sort_by(.run_started_at) | reverse')
            fi

            # 仅保留前 N 条
            TO_DELETE_RUNS=$(echo "$SORTED_RUNS" | jq ".[0:${COUNT}]")

            DELETED_COUNT=0
            SKIPPED_COUNT=0
            echo "$TO_DELETE_RUNS" | jq -c '.[]' | while IFS= read -r run; do
              ID=$(echo "$run" | jq -r '.id')
              STATUS=$(echo "$run" | jq -r '.conclusion')
              STATE=$(echo "$run" | jq -r '.status')

              if [[ "$STATE" == "in_progress" || "$STATE" == "queued" ]]; then
                echo "跳过运行 ID: $ID（状态为 $STATE）"
                continue
              fi

              if [[ "$STATUS" == "failure" && "$DELETE_FAILED" != "true" ]]; then continue; fi
              if [[ "$STATUS" == "success" && "$DELETE_SUCCESS" != "true" ]]; then continue; fi
              if [[ "$STATUS" == "cancelled" && "$DELETE_CANCELLED" != "true" ]]; then continue; fi

              echo "删除运行记录 ID: $ID (状态: $STATUS)"
              gh api -X DELETE "repos/$REPO/actions/runs/$ID" || echo "删除失败"
            done
          }

          if [[ "$WORKFLOW_NAME" == "all" ]]; then
            echo "清理所有工作流的运行记录..."
            echo ""

            # 获取所有工作流列表
            ALL_WORKFLOWS=$(gh api repos/$REPO/actions/workflows | jq -c '.workflows[]')
            WORKFLOW_COUNT=$(echo "$ALL_WORKFLOWS" | wc -l)
            echo "共找到 $WORKFLOW_COUNT 个工作流"

            echo "$ALL_WORKFLOWS" | while IFS= read -r wf; do
              WF_ID=$(echo "$wf" | jq -r '.id')
              WF_NAME=$(echo "$wf" | jq -r '.name')
              delete_runs_for_workflow "$WF_ID" "$WF_NAME"
            done
          else
            echo "查找工作流 \"$WORKFLOW_NAME\" 的 ID..."
            WORKFLOW_ID=$(gh api repos/$REPO/actions/workflows | jq -r ".workflows[] | select(.name == \"$WORKFLOW_NAME\") | .id")
            if [ -z "$WORKFLOW_ID" ]; then
              echo "未找到工作流 \"$WORKFLOW_NAME\"，退出。"
              exit 1
            fi
            delete_runs_for_workflow "$WORKFLOW_ID" "$WORKFLOW_NAME"
          fi

          echo ""
          echo "清理本工作流运行记录..."
          SELF_WORKFLOW_ID=$(gh api repos/$REPO/actions/workflows | jq -r '.workflows[] | select(.name == "清理工作流运行记录") | .id')
          if [ -n "$SELF_WORKFLOW_ID" ]; then
            gh api "repos/$REPO/actions/workflows/$SELF_WORKFLOW_ID/runs?per_page=50" \
              | jq -c '.workflow_runs[]' \
              | while IFS= read -r run; do
              ID=$(echo "$run" | jq -r '.id')
              if [[ "$ID" == "$CURRENT_RUN_ID" ]]; then
                echo "跳过当前运行 ID: $ID"
                continue
              fi
              echo "删除本工作流运行记录 ID: $ID"
              gh api -X DELETE "repos/$REPO/actions/runs/$ID" || echo "删除失败"
            done
          fi
